<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }

      body {
        display: flex;
        background: #f4f6f9;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        height: 100vh;
        background: #1e1e2f;
        color: white;
        position: fixed;
      }

      .sidebar h2 {
        text-align: center;
        padding: 20px;
        border-bottom: 1px solid #333;
      }

      .sidebar ul {
        list-style: none;
      }

      .sidebar ul li {
        padding: 15px;
        cursor: pointer;
        border-bottom: 1px solid #333;
      }

      .sidebar ul li:hover {
        background: #34344e;
      }

      /* Main */
      .main {
        margin-left: 220px;
        padding: 20px;
        width: 100%;
      }

      /* Topbar */
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      /* Cards */
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
      }

      .card h4 {
        color: #555;
      }

      .card p {
        font-size: 22px;
        font-weight: bold;
        margin-top: 10px;
      }

      /* Colors */
      .blue {
        border-left: 5px solid #007bff;
      }
      .green {
        border-left: 5px solid #28a745;
      }
      .red {
        border-left: 5px solid #dc3545;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          width: 70px;
        }
        .sidebar h2 {
          font-size: 12px;
        }
        .main {
          margin-left: 70px;
        }
      }
    </style>
  </head>

  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>ADMIN</h2>
      <ul>
        <li onclick="go('dashboard.html')">Dashboard</li>
        <li onclick="go('users.html')">Users</li>
        <li onclick="go('deposit.html')">Deposit</li>
        <li onclick="go('withdraw.html')">Withdrawal</li>
        <li onclick="go('game.html')">Game</li>
        <li onclick="go('game_management.html')">Game Management</li>
      </ul>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <h3>Dashboard</h3>
        <span>Welcome Admin</span>
      </div>

      <!-- Cards -->
      <div class="cards">
        <div class="card blue">
          <h4>Total Users</h4>
          <p id="users">0</p>
        </div>

        <div class="card green">
          <h4>Total Deposit</h4>
          <p id="deposit">₹0</p>
        </div>

        <div class="card red">
          <h4>Total Withdraw</h4>
          <p id="withdraw">₹0</p>
        </div>
      </div>
    </div>

    <script>
      function go(page) {
        window.location.href = page;
      }
    </script>
  </body>
</html>
