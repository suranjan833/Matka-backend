<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Management</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }
      body {
        display: flex;
        background: #f4f6f9;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        background: #1e1e2f;
        color: white;
        height: 100vh;
        position: fixed;
      }
      .sidebar h2 {
        text-align: center;
        padding: 20px;
      }
      .sidebar ul {
        list-style: none;
      }
      .sidebar ul li {
        padding: 15px;
        cursor: pointer;
      }
      .sidebar ul li:hover {
        background: #34344e;
      }

      /* Main */
      .main {
        margin-left: 220px;
        padding: 20px;
        width: 100%;
      }

      /* Card */
      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }

      /* Inputs */
      input,
      select {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      button {
        margin-top: 10px;
        padding: 12px;
        width: 100%;
        border: none;
        border-radius: 8px;
        background: #007bff;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }

      /* Table */
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: #007bff;
        color: white;
        padding: 12px;
      }
      td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
      }

      .delete {
        background: #dc3545;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>ADMIN</h2>
      <ul>
        <li onclick="go('dashboard.html')">Dashboard</li>
        <li onclick="go('game.html')">Game</li>
      </ul>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Add Category -->
      <div class="card">
        <h3>Add Category</h3>
        <input id="categoryName" placeholder="Morning / Mumbai" />
        <button onclick="addCategory()">Add Category</button>
      </div>

      <!-- Add Market -->
      <div class="card">
        <h3>Add Market</h3>

        <select id="categorySelect">
          <option value="">Select Category</option>
        </select>

        <input id="bazar" placeholder="Bazar Name" />
        <input type="time" id="start" />
        <input type="time" id="end" />

        <button onclick="addMarket()">Add Market</button>
      </div>

      <!-- Table -->
      <div class="card">
        <h3>Game List</h3>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Category</th>
              <th>Bazar</th>
              <th>Time</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="gameTable"></tbody>
        </table>
      </div>
    </div>

    <script>
      // 🔥 relative API (server ready)
      const API = "api/admin/";

      // 🔥 load on start
      window.onload = function () {
        loadCategories();
        loadMarkets();
      };

      // navigation
      function go(page) {
        window.location.href = page;
      }

      // 🟢 Load Categories
      function loadCategories() {
        fetch(API + "get_categories.php")
          .then((res) => res.json())
          .then((data) => {
            let dropdown = document.getElementById("categorySelect");
            dropdown.innerHTML = `<option value="">Select Category</option>`;

            if (data.status === 1) {
              data.data.forEach((cat) => {
                dropdown.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
              });
            }
          });
      }

      // 🔵 Add Category
      function addCategory() {
        let name = document.getElementById("categoryName").value;

        if (!name) {
          alert("Enter category");
          return;
        }

        fetch(API + "add_game_category.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: name }),
        })
          .then((res) => res.json())
          .then((data) => {
            alert(data.message);
            document.getElementById("categoryName").value = "";
            loadCategories(); // reload dropdown
          });
      }

      // 🟡 Add Market
      function addMarket() {
        let category_id = document.getElementById("categorySelect").value;
        let bazar = document.getElementById("bazar").value;
        let start = document.getElementById("start").value;
        let end = document.getElementById("end").value;

        if (!category_id || !bazar || !start || !end) {
          alert("All fields required");
          return;
        }

        fetch(API + "add_game_bazar.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            category_id: category_id,
            name: bazar,
            start_time: start,
            end_time: end,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            alert(data.message);

            // 🔥 IMPORTANT → reload from DB
            loadMarkets();

            // reset form
            document.getElementById("bazar").value = "";
            document.getElementById("start").value = "";
            document.getElementById("end").value = "";
          });
      }

      // 🔥 Load Markets (MAIN FIX)
      function loadMarkets() {
        fetch(API + "get_market.php")
          .then((res) => res.json())
          .then((data) => {
            let table = document.getElementById("gameTable");
            table.innerHTML = "";

            if (data.status === 1) {
              data.data.forEach((item, index) => {
                let row = `
        <tr>
          <td>${index + 1}</td>
          <td>${item.category_name}</td>
          <td>${item.name}</td>
          <td>${item.time}</td>
          <td>
            <button class="delete" onclick="deleteMarket(${item.id})">Delete</button>
          </td>
        </tr>
        `;

                table.innerHTML += row;
              });
            }
          });
      }

      // 🔴 Delete Market
      function deleteMarket(id) {
        if (!confirm("Delete this game?")) return;

        fetch(API + "delete_market.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: id }),
        })
          .then((res) => res.json())
          .then((data) => {
            alert(data.message);
            loadMarkets(); // reload
          });
      }
    </script>
  </body>
</html>
